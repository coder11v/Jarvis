<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --jarvis-blue: #0ea5e9;
            --jarvis-blue-glow: rgba(14, 165, 233, 0.4);
            --jarvis-dark: #0f172a;
            --jarvis-panel: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--jarvis-dark);
            background-image:
                radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%),
                linear-gradient(to right, rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        .glass-panel {
            background: var(--jarvis-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #chat-container::-webkit-scrollbar {
            width: 6px;
        }

        #chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(14, 165, 233, 0.3);
            border-radius: 10px;
        }

        .jarvis-glow {
            box-shadow: 0 0 20px var(--jarvis-blue-glow);
            transition: all 0.3s ease;
        }

        .jarvis-glow:hover {
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.6);
            transform: translateY(-1px);
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .jarvis-message {
            align-self: flex-start;
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.2);
            color: #f8fafc;
            border-bottom-left-radius: 4px;
        }

        .status-ring {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-ring::before,
        .status-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .status-ring.online::before {
            border-top-color: #10b981;
            border-right-color: rgba(16, 185, 129, 0.3);
            animation: spin 3s linear infinite;
        }

        .status-ring.thinking::before {
            border-top-color: #f59e0b;
            border-right-color: rgba(245, 158, 11, 0.3);
            border-bottom-color: rgba(245, 158, 11, 0.1);
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .status-ring.listening::before {
            border-top-color: #ef4444;
            border-bottom-color: #ef4444;
            animation: spin 1.5s linear infinite;
        }

        .status-ring.speaking::before {
            border-color: #0ea5e9;
            animation: pulse-ring 1s ease-out infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        /* Scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--jarvis-blue);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center p-4">
    <div class="scanline"></div>

    <!-- Password Modal -->
    <div id="password-modal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md">
        <div class="glass-panel rounded-2xl p-10 max-w-sm w-full text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent">
            </div>

            <div class="mb-8 relative flex justify-center">
                <div
                    class="w-20 h-20 rounded-full border-2 border-blue-500/30 flex items-center justify-center jarvis-glow relative z-10 bg-slate-800">
                    <svg class="w-10 h-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl font-bold text-white mb-2 tracking-wide uppercase text-blue-100">J.A.R.V.I.S.</h2>
            <p class="text-blue-400/60 text-sm mb-8 font-['JetBrains_Mono'] tracking-widest uppercase">System
                Authentication</p>

            <div class="relative mb-6">
                <input type="password" id="password-input"
                    class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-5 py-3 text-white text-center tracking-widest focus:outline-none focus:border-blue-400 transition-colors placeholder-slate-500"
                    placeholder="•••••••">
            </div>

            <button id="password-btn"
                class="w-full bg-blue-600/20 text-blue-400 border border-blue-500/50 hover:bg-blue-600 hover:text-white uppercase tracking-wider text-sm font-bold py-3 px-4 rounded-xl transition-all duration-300 jarvis-glow">
                Initialize Systems
            </button>
            <p id="password-error"
                class="text-red-400 text-xs mt-4 h-4 font-['JetBrains_Mono'] opacity-0 transition-opacity">
                Authentication Failed.</p>
        </div>
    </div>

    <!-- Main Interface -->
    <div id="main-content" class="h-[95vh] w-full max-w-5xl flex-col hidden relative z-10 pt-4">

        <!-- Header -->
        <header class="glass-panel rounded-2xl p-4 mb-4 flex items-center justify-between">
            <div class="flex items-center gap-5">
                <div class="status-ring online" id="main-status-ring">
                    <img src="stark.svg" alt="Stark Industries" class="w-10 h-10 object-contain mx-auto brightness-200"
                        onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdib3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDJMMiAyMmgyMGwtMTAtMjB6Ii8+PC9zdmc+'">
                </div>
                <div>
                    <h1
                        class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300 tracking-wider">
                        J.A.R.V.I.S.</h1>
                    <p id="status-text"
                        class="text-xs font-['JetBrains_Mono'] text-emerald-400 uppercase tracking-widest mt-1 shadow-green-500">
                        System Online</p>
                </div>
            </div>

            <!-- Settings / Info -->
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-slate-400 font-['JetBrains_Mono'] uppercase tracking-widest">Protocol:
                    Override Alpha</p>
                <p class="text-[10px] text-slate-500 font-['JetBrains_Mono'] uppercase tracking-widest mt-1">Host:
                    Localhost / Cloudflare Proxy</p>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-container"
            class="flex-1 overflow-y-auto mb-4 p-6 glass-panel rounded-2xl flex flex-col gap-4 scroll-smooth">
            <!-- Messages will be injected here -->
        </main>

        <!-- Input Area -->
        <footer class="glass-panel p-3 rounded-2xl flex items-center gap-3">
            <button id="listen-btn"
                class="p-4 bg-slate-800 border border-slate-600 hover:border-blue-400 rounded-xl text-blue-400 transition-all duration-300 group relative">
                <div
                    class="absolute inset-0 bg-blue-500 opacity-0 group-hover:opacity-10 blur-md rounded-xl transition-opacity">
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 relative z-10" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <div class="flex-1 relative">
                <input type="text" id="user-input"
                    class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-5 py-4 text-white font-['JetBrains_Mono'] focus:outline-none focus:border-blue-500 focus:bg-slate-900 transition-all placeholder-slate-500 text-sm"
                    placeholder="Enter command protocol..." autocomplete="off">
            </div>
            <button id="send-btn"
                class="px-8 py-4 bg-blue-600/20 border border-blue-500/50 hover:bg-blue-600 hover:text-white rounded-xl text-blue-400 font-bold tracking-wider transition-all duration-300 uppercase text-sm group jarvis-glow">
                <span class="relative z-10">Execute</span>
            </button>
        </footer>
    </div>

    <script>
        // CONFIGURATION
        // REPLACE THIS WITH YOUR CLOUDFLARE WORKER DEPLOYMENT URL IN PRODUCTION
        const WORKER_URL = "https://jarvis-proxy.veerbajaj11.workers.dev/api/generate";

        // --- DOM Elements ---
        const passwordModal = document.getElementById('password-modal');
        const passwordInput = document.getElementById('password-input');
        const passwordBtn = document.getElementById('password-btn');
        const passwordError = document.getElementById('password-error');
        const mainContent = document.getElementById('main-content');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const listenBtn = document.getElementById('listen-btn');
        const statusText = document.getElementById('status-text');
        const mainStatusRing = document.getElementById('main-status-ring');

        // --- State ---
        let chatHistory = [];
        let audioContext = null;
        let isAudioUnlocked = false;

        // --- Voice Recording ---
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        const JARVIS_PROMPT = {
            role: 'user',
            parts: [{ text: `You are J.A.R.V.I.S. (Just A Rather Very Intelligent System), a witty, sophisticated, and incredibly helpful AI assistant with a British accent, created by Tony Stark. The user is "Sir". Your goal is to assist with tasks, provide information concisely, and execute protocols. Keep your responses highly intelligent, helpful, and concise. Make references to Mr. Stark and Stark Industries when appropriate. Do not use emojis. Always try your best to verify specific facts via tools, or fetch latest stock / weather information using the tools provided before answering if relevant.` }]
        };
        const INITIAL_RESPONSE = {
            role: 'model',
            parts: [{ text: 'Good morning user, how may I assist you?' }]
        };

        const JARVIS_TOOLS = [{
            functionDeclarations: [
                {
                    name: "get_weather",
                    description: "Get the current weather. If 'location' is not provided, it will request and use the device's current location.",
                    parameters: {
                        type: "OBJECT",
                        properties: { location: { type: "STRING", description: "City and state/country. Optional." } }
                    }
                },
                {
                    name: "get_wikipedia_summary",
                    description: "Get a summary of a topic from Wikipedia.",
                    parameters: {
                        type: "OBJECT",
                        properties: { topic: { type: "STRING", description: "Topic to search for" } },
                        required: ["topic"]
                    }
                },
                {
                    name: "get_investing_info",
                    description: "Get current stock price and recent financial news.",
                    parameters: {
                        type: "OBJECT",
                        properties: { ticker: { type: "STRING", description: "Stock ticker symbol, e.g., AAPL" } },
                        required: ["ticker"]
                    }
                }
            ]
        }];

        // --- Functions ---
        function checkPassword() {
            const pass = passwordInput.value.trim();
            if (pass.toLowerCase() === 'ironman') {
                passwordModal.style.opacity = '0';
                setTimeout(() => {
                    passwordModal.classList.add('hidden');
                    mainContent.classList.remove('hidden');
                    mainContent.classList.add('flex');
                    initializeInterface();
                }, 300);
            } else {
                passwordError.style.opacity = '1';
                passwordInput.value = '';
                passwordInput.classList.add('border-red-500');
                setTimeout(() => {
                    passwordError.style.opacity = '0';
                    passwordInput.classList.remove('border-red-500');
                }, 2000);
            }
        }

        function unlockAudio() {
            if (isAudioUnlocked) return;
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                    // Play absolute silent buffer to truly unlock Safari restrictions
                    const buffer = audioContext.createBuffer(1, 1, 22050);
                    const source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.destination);
                    source.start(0);

                    isAudioUnlocked = true;
                    console.log("Audio deeply unlocked.");
                });
            } else {
                isAudioUnlocked = true;
                console.log("Audio initially unlocked.");
            }
        }

        function setStatus(status, text, colorClass) {
            mainStatusRing.className = `status-ring ${status}`;
            statusText.textContent = text;
            statusText.className = `text-xs font-['JetBrains_Mono'] uppercase tracking-widest mt-1 ${colorClass}`;
        }

        function initializeInterface() {
            chatHistory = [JARVIS_PROMPT, INITIAL_RESPONSE];
            chatContainer.innerHTML = '';
            addMessageToChat('J.A.R.V.I.S.', INITIAL_RESPONSE.parts[0].text, 'jarvis-message');
            setStatus('online', 'System Online', 'text-emerald-400 drop-shadow-[0_0_5px_rgba(16,185,129,0.8)]');
        }

        function addMessageToChat(sender, message, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col max-w-[85%] ${type === 'user-message' ? 'self-end' : 'self-start'} animate-[fadeIn_0.3s_ease-out]`;

            const senderLabel = document.createElement('span');
            senderLabel.className = `text-[10px] uppercase tracking-widest mb-1 font-['JetBrains_Mono'] ${type === 'user-message' ? 'text-blue-300 text-right' : 'text-slate-400'}`;
            senderLabel.textContent = sender;

            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-5 py-3 ${type} shadow-lg leading-relaxed text-sm`;
            // Preserve line breaks for code/formatting
            bubble.innerHTML = message.replace(/\n/g, '<br>');

            wrapper.appendChild(senderLabel);
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return wrapper;
        }

        function addTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = `flex flex-col max-w-[85%] self-start pt-2`;
            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-5 py-4 jarvis-message typing-indicator flex items-center gap-1`;
            bubble.innerHTML = `<span></span><span></span><span></span>`;
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // --- Audio Decoding & Synthesis ---
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function playAudioBuffer(arrayBuffer, sampleRate) {
            const pcm16 = new Int16Array(arrayBuffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768; // Normalize 16-bit PCM to float32
            }

            const audioBuffer = audioContext.createBuffer(1, float32.length, sampleRate);
            audioBuffer.getChannelData(0).set(float32);

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);

            source.onended = () => {
                setStatus('online', 'System Online', 'text-emerald-400 drop-shadow-[0_0_5px_rgba(16,185,129,0.8)]');
            };

            source.start(0);
        }

        function speakFallbackNative(text) {
            console.log("Using native Web Speech API fallback...");
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const voice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Male')) ||
                voices.find(v => v.lang === 'en-GB') ||
                voices[0];
            if (voice) utterance.voice = voice;
            utterance.rate = 1.0;
            utterance.pitch = 0.9;

            utterance.onend = () => setStatus('online', 'System Online', 'text-emerald-400');
            utterance.onerror = (e) => {
                console.error("Native TTS Error", e);
                setStatus('online', 'System Online', 'text-emerald-400');
            }
            window.speechSynthesis.speak(utterance);
        }

        async function speak(text) {
            if (!text || !isAudioUnlocked) return;

            setStatus('speaking', 'Audio Output Active', 'text-blue-400 drop-shadow-[0_0_5px_rgba(14,165,233,0.8)]');

            try {
                // Try Gemini TTS output via Cloudflare proxy worker
                const targetUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent';
                const payload = {
                    contents: [{ parts: [{ text: `Say in a sophisticated, clear British male voice: ${text}` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: { prebuiltVoiceConfig: { voiceName: "Rasalgethi" } }
                        }
                    }
                };

                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: targetUrl, payload })
                });

                if (!response.ok) throw new Error(`Proxy TTS Error: ${response.status}`);

                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error.message || "Proxy API Error");
                }

                const part = result?.candidates?.[0]?.content?.parts?.[0];
                const audioData = part?.inlineData?.data;
                const mimeType = part?.inlineData?.mimeType;

                if (audioData && mimeType?.startsWith("audio/")) {
                    const sampleRateMatch = mimeType.match(/rate=(\d+)/);
                    const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000;

                    const buffer = base64ToArrayBuffer(audioData);
                    playAudioBuffer(buffer, sampleRate);
                } else {
                    throw new Error("Invalid audio payload");
                }
            } catch (error) {
                console.warn("Gemini Audio failed, falling back to Native TTS.", error);
                speakFallbackNative(text);
            }
        }

        // Initialize voices for fallback
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function injectCard(htmlContent) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col max-w-[85%] self-start animate-[fadeIn_0.3s_ease-out] w-full mt-2 mb-2`;
            wrapper.innerHTML = htmlContent;
            const ti = document.getElementById('typing-indicator');
            if (ti) {
                chatContainer.insertBefore(wrapper, ti);
            } else {
                chatContainer.appendChild(wrapper);
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderWeatherCard(data) {
            if (data.error) return;
            let wc = data.current.weather_code || 0;
            let icon = '☀️';
            if (wc >= 1 && wc <= 3) icon = '⛅';
            if (wc >= 51 && wc <= 67) icon = '🌧️';
            if (wc >= 71 && wc <= 77) icon = '❄️';

            const html = `
            <div class="glass-panel rounded-2xl p-4 border border-blue-500/30 flex items-center justify-between w-64 shadow-[0_0_15px_rgba(14,165,233,0.2)]">
                <div class="flex flex-col">
                    <span class="text-xs text-blue-300 font-['JetBrains_Mono'] uppercase tracking-wider mb-1">Weather Protocol</span>
                    <span class="font-bold text-lg text-white">${data.location}</span>
                    <span class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-cyan-100">${data.current.temperature_2m}°F</span>
                    <span class="text-xs text-slate-400 mt-1">Wind: ${data.current.wind_speed_10m} mph</span>
                </div>
                <div class="text-5xl drop-shadow-lg">${icon}</div>
            </div>`;
            injectCard(html);
        }

        function renderWikiCard(data) {
            if (data.error) return;
            const thumb = data.thumbnail ? `<img src="${data.thumbnail}" class="w-16 h-16 object-cover rounded-lg mr-4 border border-blue-500/30 shrink-0">` : '';
            const html = `
            <div class="glass-panel rounded-2xl p-4 border border-blue-500/30 flex items-start shadow-[0_0_15px_rgba(14,165,233,0.2)]">
                ${thumb}
                <div class="flex flex-col flex-1">
                    <span class="text-xs text-purple-300 font-['JetBrains_Mono'] uppercase tracking-wider mb-1 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"></path></svg>
                        Wikipedia Database
                    </span>
                    <span class="font-bold text-lg text-white mb-2">${data.title}</span>
                    <p class="text-sm text-slate-300 line-clamp-3 leading-relaxed">${data.extract}</p>
                </div>
            </div>`;
            injectCard(html);
        }

        function renderInvestingCard(data) {
            if (data.error) return;
            let newsHtml = '';
            if (data.news && data.news.length > 0) {
                newsHtml = `<div class="mt-3 pt-3 border-t border-blue-500/20 flex flex-col gap-2">` +
                    data.news.map(n => `<a href="${n.link}" target="_blank" class="text-xs text-blue-200 hover:text-white truncate transition-colors flex items-center gap-2"><div class="w-1 h-1 rounded-full border border-blue-400 shrink-0 bg-blue-400"></div><span class="truncate">${n.title}</span></a>`).join('') +
                    `</div>`;
            }
            const html = `
            <div class="glass-panel rounded-2xl p-4 border border-emerald-500/30 flex flex-col shadow-[0_0_15px_rgba(16,185,129,0.2)] w-80">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs text-emerald-300 font-['JetBrains_Mono'] uppercase tracking-wider flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        Market Data
                    </span>
                    <span class="px-2 py-0.5 rounded bg-emerald-500/20 text-emerald-400 font-bold text-sm tracking-widest">${data.ticker}</span>
                </div>
                <div class="flex items-end gap-2">
                    <span class="text-3xl font-bold text-white">${data.price}</span>
                </div>
                ${newsHtml}
            </div>`;
            injectCard(html);
        }

        async function executeGeminiTurn() {
            let turnActive = true;
            let turnsTracker = 0;
            while (turnActive && turnsTracker < 5) {
                turnsTracker++;
                const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`;
                const requestBody = {
                    url: targetUrl,
                    payload: {
                        contents: chatHistory,
                        tools: JARVIS_TOOLS
                    }
                };

                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

                const result = await response.json();

                if (result.error) throw new Error(result.error.message);

                const candidate = result.candidates?.[0];
                if (!candidate?.content?.parts?.[0]) throw new Error("Invalid response architecture.");

                const part = candidate.content.parts[0];
                chatHistory.push(candidate.content);

                if (part.functionCall) {
                    const call = part.functionCall;
                    const fnName = call.name;
                    const args = call.args;
                    let toolResult = null;

                    try {
                        let workerBaseUrl = WORKER_URL.replace('/api/generate', '');
                        if (fnName === 'get_weather') {
                            let url = `${workerBaseUrl}/api/tools/weather`;
                            if (args.location) {
                                url += `?location=${encodeURIComponent(args.location)}`;
                            } else {
                                addMessageToChat('System', 'Requesting device location...', 'jarvis-message');
                                try {
                                    const pos = await new Promise((resolve, reject) => {
                                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 });
                                    });
                                    url += `?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`;
                                } catch (err) {
                                    throw new Error("Could not access device location. " + err.message);
                                }
                            }
                            const res = await fetch(url);
                            toolResult = await res.json();
                            renderWeatherCard(toolResult);
                        } else if (fnName === 'get_wikipedia_summary') {
                            const res = await fetch(`${workerBaseUrl}/api/tools/wikipedia?topic=${encodeURIComponent(args.topic)}`);
                            toolResult = await res.json();
                            renderWikiCard(toolResult);
                        } else if (fnName === 'get_investing_info') {
                            const res = await fetch(`${workerBaseUrl}/api/tools/investing?ticker=${encodeURIComponent(args.ticker)}`);
                            toolResult = await res.json();
                            renderInvestingCard(toolResult);
                        }
                    } catch (e) {
                        toolResult = { error: e.message };
                    }

                    chatHistory.push({
                        role: 'function',
                        parts: [{
                            functionResponse: {
                                name: fnName,
                                response: { name: fnName, content: toolResult }
                            }
                        }]
                    });
                } else {
                    removeTypingIndicator();
                    const jarvisResponse = part.text;
                    addMessageToChat('J.A.R.V.I.S.', jarvisResponse, 'jarvis-message');
                    speak(jarvisResponse);
                    turnActive = false;
                }
            }
        }

        async function handleUserMessage(userMessage) {
            if (!userMessage) return;

            unlockAudio();
            addMessageToChat('You', userMessage, 'user-message');
            userInput.value = '';

            setStatus('thinking', 'Processing Request...', 'text-amber-400 drop-shadow-[0_0_5px_rgba(245,158,11,0.8)]');
            addTypingIndicator();

            try {
                chatHistory.push({ role: 'user', parts: [{ text: userMessage }] });
                await executeGeminiTurn();
            } catch (error) {
                console.error(error);
                removeTypingIndicator();
                const errorMessage = `Apologies, Sir. I encountered a critical fault in communication routing: ${error.message}`;
                addMessageToChat('J.A.R.V.I.S.', errorMessage, 'jarvis-message');
                speakFallbackNative("System error encountered.");
                setStatus('online', 'System Online', 'text-emerald-400');
            }
        }

        // --- Listeners ---
        passwordBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => e.key === 'Enter' && checkPassword());
        sendBtn.addEventListener('click', () => handleUserMessage(userInput.value.trim()));
        userInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleUserMessage(userInput.value.trim()));

        // --- Direct Audio Capture ---
        async function startVoiceRecording() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("Microphone API unavailable. This requires HTTPS or 'localhost'. If you are accessing via an IP like 192.168.x.x, use 'localhost' or run 'npx localtunnel --port 14212' to securely test from your phone.");
                }
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isRecording = true;

                listenBtn.classList.remove('bg-slate-800');
                listenBtn.classList.add('bg-red-900/40', 'border-red-500', 'jarvis-glow');

                setStatus('listening', 'Awaiting Audio Input...', 'text-red-400 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]');

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const mimeType = mediaRecorder.mimeType || 'audio/webm';
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    stream.getTracks().forEach(track => track.stop());

                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64Audio = reader.result.split(',')[1];
                        handleVoiceMessage(base64Audio, mimeType);
                    };
                    reader.readAsDataURL(audioBlob);
                };

                mediaRecorder.start();
            } catch (err) {
                console.error("Microphone Access Error:", err);
                // Also give the user a visual heads up in the chat!
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    addMessageToChat('System Alert', `Microphone access blocked. Modern browsers disable microphones on non-HTTPS networks.<br><br><b>How to fix immediately:</b><br>1. Change your URL from <code>http://IP_ADDRESS</code> to <code>http://localhost:14212</code><br>2. To test on a phone, use localtunnel by running: <code>npx localtunnel --port 14212</code> in your terminal and visit the generated HTTPS link.`, 'jarvis-message');
                } else {
                    addMessageToChat('System Alert', 'Microphone access denied or not found. Please check your browser permissions.', 'jarvis-message');
                }
                setStatus('online', 'System Online', 'text-emerald-400');
                isRecording = false;
                listenBtn.classList.add('bg-slate-800');
                listenBtn.classList.remove('bg-red-900/40', 'border-red-500', 'jarvis-glow');
            }
        }

        async function handleVoiceMessage(base64Audio, mimeType) {
            unlockAudio();
            addMessageToChat('You', '[Audio Command Transmitted]', 'user-message');
            setStatus('thinking', 'Processing Voice...', 'text-amber-400 drop-shadow-[0_0_5px_rgba(245,158,11,0.8)]');
            addTypingIndicator();

            try {
                chatHistory.push({
                    role: 'user',
                    parts: [
                        { inlineData: { mimeType: mimeType, data: base64Audio } },
                        { text: "Respond to my voice command appropriately." }
                    ]
                });

                await executeGeminiTurn();

            } catch (error) {
                console.error(error);
                removeTypingIndicator();
                addMessageToChat('J.A.R.V.I.S.', `Fault in sensory routing: ${error.message}`, 'jarvis-message');
                speakFallbackNative("System error encountered.");
                setStatus('online', 'System Online', 'text-emerald-400');
            }
        }

        listenBtn.addEventListener('click', () => {
            unlockAudio();
            if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                isRecording = false;
                listenBtn.classList.add('bg-slate-800');
                listenBtn.classList.remove('bg-red-900/40', 'border-red-500', 'jarvis-glow');
                setStatus('online', 'System Online', 'text-emerald-400');
            } else {
                startVoiceRecording();
            }
        });
    </script>
